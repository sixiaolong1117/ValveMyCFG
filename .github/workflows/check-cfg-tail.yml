name: Check CFG File Footer
on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write


jobs:
  check-cfg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史才能获取文件最后修改时间

      - name: Prepare script
        run: chmod +x .github/scripts/check_cfg_footer.sh

      - name: Run CFG footer check
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: .github/scripts/check_cfg_footer.sh

      - name: Commit and push if needed
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- '*.cfg'
          if ! git diff --cached --quiet; then
            git commit -m "fix(cfg): update cfg footer dates [skip ci]"
            git push
          else
            echo "No changes needed."
          fi

      - name: Check pull request result
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet -- '*.cfg'; then
            echo "CFG footer dates need updating. Run the footer script locally and commit the changed cfg files."
            git diff -- '*.cfg'
            exit 1
          fi
